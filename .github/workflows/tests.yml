name: Tests

on:
  pull_request:
  push:
    branches:
      - 'master'
    tags:
      - '*'

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          architecture: x86

      - uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore sa2-hunting-teacher.sln

      - name: Build tests
        run: dotnet build unit-tests/unit-tests.csproj --configuration Release /p:Platform=x86 --no-restore

      - name: Run tests
        run: dotnet test unit-tests/unit-tests.csproj --configuration Release --no-build /p:Platform=x86

      - name: Publish (verifies full release pipeline)
        run: msbuild sa2-hunting-teacher/sa2-hunting-teacher.csproj /t:Publish /p:Configuration=Release /p:Platform=x86 /p:PublishProfile=FolderProfile
